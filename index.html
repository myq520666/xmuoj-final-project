<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>期末大作业</title>
<style>
  :root {
    --bg: #f8f9fa; --card-bg: #ffffff; --text: #1a1a2e;
    --text-secondary: #6c757d; --border: #e9ecef; --accent: #4f46e5;
    --accent-light: #eef2ff; --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6;
  }

  /* ---- Welcome overlay ---- */
  .welcome-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4f46e5 100%);
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.6s ease, visibility 0.6s ease;
    opacity: 1; visibility: visible;
  }
  .welcome-overlay.hidden {
    opacity: 0; visibility: hidden; pointer-events: none;
  }
  .welcome-content {
    text-align: center; color: white;
    animation: welcomeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes welcomeIn {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .welcome-content h1 {
    font-size: 2.4rem; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 8px;
  }
  .welcome-content .welcome-sub {
    font-size: 1rem; opacity: 0.75; font-weight: 300; margin-bottom: 24px;
  }
  .welcome-text {
    font-size: 3rem; font-weight: 900; letter-spacing: 0.3em;
    animation: welcomePulse 2s ease-in-out infinite;
  }
  @keyframes welcomePulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.06); }
  }

  /* ---- Header ---- */
  .header {
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4f46e5 100%);
    color: white; padding: 40px 24px 32px; text-align: center;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(79, 70, 229, 0.25);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }
  .header.hidden { transform: translateY(-100%); }
  .header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 4px; }
  .header .subtitle { font-size: 0.85rem; opacity: 0.8; font-weight: 400; }
  .header .meta { margin-top: 8px; display: flex; gap: 12px; justify-content: center; font-size: 0.78rem; opacity: 0.7; }

  /* ---- Main content ---- */
  .header-spacer { height: 160px; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 24px 80px; }
  .stats { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
  .stat-card {
    background: var(--card-bg); border-radius: 12px; padding: 16px 24px;
    box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; flex: 1; min-width: 140px;
  }
  .stat-card .icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  .icon.all { background: #eef2ff; } .icon.easy { background: #dcfce7; }
  .icon.mid { background: #fef3c7; } .icon.hard { background: #fee2e2; } .icon.solution { background: #ede9fe; }
  .stat-value { font-size: 1.5rem; font-weight: 700; line-height: 1.2; }
  .stat-label { font-size: 0.8rem; color: var(--text-secondary); }
  .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 20px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--card-bg); cursor: pointer; font-size: 0.875rem;
    font-weight: 500; transition: all 0.2s; color: var(--text-secondary);
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .problem-list { display: flex; flex-direction: column; gap: 16px; }
  .problem-card {
    background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow);
    overflow: hidden; transition: box-shadow 0.2s; border: 1px solid var(--border);
  }
  .problem-card:hover { box-shadow: var(--shadow-hover); }
  .problem-header {
    padding: 20px 24px; cursor: pointer; display: flex; align-items: center; gap: 14px; user-select: none;
  }
  .problem-header:hover { background: #fafbfc; }
  .problem-id { font-family: "SF Mono", "Fira Code", "Consolas", monospace; font-size: 0.85rem; color: var(--accent); font-weight: 600; min-width: 60px; }
  .problem-title { font-size: 1.1rem; font-weight: 600; flex: 1; }
  .difficulty-badge { font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 12px; letter-spacing: 0.05em; }
  .difficulty-badge.Low { background: #dcfce7; color: #15803d; }
  .difficulty-badge.Mid { background: #fef3c7; color: #b45309; }
  .difficulty-badge.High { background: #fee2e2; color: #b91c1c; }
  .expand-icon { width: 24px; height: 24px; transition: transform 0.25s; opacity: 0.4; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
  .problem-card.open .expand-icon { transform: rotate(180deg); }
  .solution-status { font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 10px; letter-spacing: 0.04em; white-space: nowrap; margin-left: 4px; }
  .solution-status.has { background: #dcfce7; color: #15803d; }
  .solution-status.none { background: #f3f4f6; color: #9ca3af; }
  .problem-body { display: none; padding: 0 24px 24px; border-top: 1px solid var(--border); }
  .problem-card.open .problem-body { display: block; }
  .section { margin-top: 20px; }
  .section-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 8px; }
  .section-content { background: #f8f9fb; border-radius: 8px; padding: 16px; font-size: 0.9rem; line-height: 1.7; color: #374151; }
  .section-content p { margin-bottom: 8px; }
  .section-content p:last-child { margin-bottom: 0; }
  .sample-block { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 640px) { .sample-block { grid-template-columns: 1fr; } }
  .sample-box {
    background: #1e1e2e; color: #cdd6f4; border-radius: 8px;
    padding: 14px 18px; font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; min-height: 48px;
  }
  .sample-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #a0a0b0; margin-bottom: 6px; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .tag { font-size: 0.7rem; padding: 2px 10px; border-radius: 10px; background: #f0f0f5; color: #6b7280; }

  .solution-display {
    background: linear-gradient(135deg, #fefce8 0%, #fffbeb 100%);
    border: 1px solid #fde68a; border-radius: 10px;
    padding: 18px 20px; margin-top: 8px;
    font-size: 0.9rem; line-height: 1.8; color: #374151; white-space: pre-wrap;
  }
  .solution-display:empty::after {
    content: "暂无题解，等待作者更新..."; color: #9ca3af; font-style: italic;
  }

  .draft-box { margin-top: 20px; }
  .draft-box textarea {
    width: 100%; min-height: 120px; padding: 14px 16px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 0.9rem; line-height: 1.7; resize: vertical;
    transition: border-color 0.2s, box-shadow 0.2s; background: #fafbfc;
  }
  .draft-box textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); background: white; }
  .draft-box textarea::placeholder { color: #c0c4cc; }

  .editor-toolbar {
    background: var(--accent-light); border-radius: 10px;
    padding: 12px 20px; margin-bottom: 24px;
    display: none; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .editor-toolbar.show { display: flex; }
  .btn {
    padding: 8px 20px; border-radius: 20px; border: none;
    font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-success { background: #22c55e; color: white; }
  .btn-success:hover { opacity: 0.85; }
  .btn-success:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { background: white; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-outline:hover { background: var(--accent-light); }

  .footer { text-align: center; padding: 40px 24px 100px; color: var(--text-secondary); font-size: 0.85rem; }

  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #1e1b4b; color: white; padding: 12px 28px; border-radius: 24px;
    font-size: 0.9rem; z-index: 999; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .toast.show { opacity: 1; }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); display: none; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 300; display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white; border-radius: 16px; padding: 32px;
    max-width: 440px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h3 { font-size: 1.1rem; margin-bottom: 8px; }
  .modal p { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
  .modal input {
    width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 0.9rem; margin-bottom: 16px;
  }
  .modal input:focus { outline: none; border-color: var(--accent); }
  .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<!-- Welcome overlay -->
<div class="welcome-overlay" id="welcomeOverlay">
  <div class="welcome-content">
    <h1>期末大作业</h1>
    <p class="welcome-sub">作者：马玥琦</p>
    <div class="welcome-text">欢迎</div>
  </div>
</div>

<!-- Header -->
<div class="header" id="header">
  <h1>期末大作业</h1>
  <p class="subtitle">作者：马玥琦</p>
  <div class="meta">
    <span>共 <span id="totalCount">62</span> 题</span><span>·</span><span>AI协同编程</span>
  </div>
</div>

<div class="header-spacer"></div>

<div class="container">
  <div class="stats">
    <div class="stat-card">
      <div class="icon all">📝</div>
      <div><div class="stat-value" id="statAll">62</div><div class="stat-label">全部题目</div></div>
    </div>
    <div class="stat-card">
      <div class="icon easy">🟢</div>
      <div><div class="stat-value" id="statLow">12</div><div class="stat-label">低难度</div></div>
    </div>
    <div class="stat-card">
      <div class="icon mid">🟡</div>
      <div><div class="stat-value" id="statMid">32</div><div class="stat-label">中等难度</div></div>
    </div>
    <div class="stat-card">
      <div class="icon hard">🔴</div>
      <div><div class="stat-value" id="statHigh">18</div><div class="stat-label">高难度</div></div>
    </div>
    <div class="stat-card">
      <div class="icon solution">📖</div>
      <div><div class="stat-value" id="statSolution">0/62</div><div class="stat-label">已有题解</div></div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterProblems('all')">全部</button>
    <button class="filter-btn" onclick="filterProblems('Low')">🟢 低难度</button>
    <button class="filter-btn" onclick="filterProblems('Mid')">🟡 中等</button>
    <button class="filter-btn" onclick="filterProblems('High')">🔴 高难度</button>
  </div>

  <div class="editor-toolbar" id="editorToolbar">
    <span>✏️ 题解编辑模式</span>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-outline" onclick="exportDrafts()">📥 导出备份</button>
      <button class="btn btn-outline" onclick="importDrafts()">📤 导入备份</button>
      <button class="btn btn-success" id="btnPublish" onclick="publishAll()">🚀 一键发布</button>
      <button class="btn btn-outline" onclick="toggleEditMode()">退出编辑</button>
    </div>
  </div>

  <div class="problem-list" id="problemList"></div>
  <div class="empty-state" id="emptyState">没有匹配的题目</div>

<div class="toast" id="toast"></div>
<input type="file" id="importFile" style="display:none" accept=".json" onchange="handleImport(event)">

<div class="modal-overlay" id="tokenModal">
  <div class="modal">
    <h3>设置 GitHub Token</h3>
    <p>发布题解需要一个 GitHub Personal Access Token。此 Token 仅保存在你的浏览器中，不会上传到任何地方。</p>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closeTokenModal()">取消</button>
      <button class="btn btn-primary" onclick="saveToken()">保存</button>
    </div>
  </div>
</div>

<div class="footer">
  <p>马玥琦 · 2026年程序设计实践 · 厦门大学</p>
  <p style="margin-top:8px;font-size:0.78rem;">
    <a href="#" onclick="toggleEditMode()" style="color:var(--text-secondary);">题解编辑模式</a>
    &nbsp;|&nbsp;
    <a href="#" onclick="showTokenModal()" style="color:var(--text-secondary);">设置发布密钥</a>
  </p>
</div>

<script>
const REPO = "myq520666/xmuoj-final-project";
let PID_LIST = [];
let editMode = false;
let problems = [];

// ========== Welcome overlay ==========
(function() {
  var overlay = document.getElementById("welcomeOverlay");
  setTimeout(function() {
    overlay.classList.add("hidden");
    setTimeout(function() { overlay.remove(); }, 700);
  }, 1800);
})();

// ========== Smart header: hide on scroll down, show on scroll up ==========
(function() {
  var header = document.getElementById("header");
  var lastY = 0;
  var ticking = false;
  var threshold = 80;

  function update() {
    var y = window.scrollY;
    if (y < threshold) {
      header.classList.remove("hidden");
    } else if (y > lastY + 8) {
      header.classList.add("hidden");
    } else if (y < lastY - 8) {
      header.classList.remove("hidden");
    }
    lastY = y;
    ticking = false;
  }

  window.addEventListener("scroll", function() {
    if (!ticking) {
      requestAnimationFrame(update);
      ticking = true;
    }
  }, { passive: true });
})();

// ========== Render problems ==========
function renderProblemCard(p) {
  var card = document.createElement("div");
  card.className = "problem-card";
  card.dataset.difficulty = p.difficulty;

  var diffLabel = { Low: "Low", Mid: "Mid", High: "High" }[p.difficulty] || p.difficulty;

  var tagsHtml = "";
  if (p.tags && p.tags.length > 0) {
    tagsHtml = '<div class="tags">' + p.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join("") + '</div>';
  }

  var sections = "";
  if (p.description) sections += '<div class="section"><div class="section-title">题目描述</div>' + p.description + '</div>';
  if (p.inputFormat) sections += '<div class="section"><div class="section-title">输入格式</div>' + p.inputFormat + '</div>';
  if (p.outputFormat) sections += '<div class="section"><div class="section-title">输出格式</div>' + p.outputFormat + '</div>';
  if (p.sampleInput && p.sampleOutput) {
    sections += '<div class="section"><div class="section-title">样例</div><div class="sample-block"><div class="sample-box"><div class="sample-label">输入 #1</div>' + p.sampleInput + '</div><div class="sample-box"><div class="sample-label">输出 #1</div>' + p.sampleOutput + '</div></div></div>';
  }
  if (p.hint) sections += '<div class="section"><div class="section-title">提示</div>' + p.hint + '</div>';
  if (p.limits) sections += '<div class="section"><div class="section-title">限制</div>' + p.limits + '</div>';

  card.innerHTML =
    '<div class="problem-header" onclick="toggleProblem(this)">' +
      '<span class="problem-id">' + p.id + '</span>' +
      '<span class="problem-title">' + p.title + '</span>' +
      '<span class="difficulty-badge ' + diffLabel + '">' + diffLabel + '</span>' +
      '<span class="expand-icon">▼</span>' +
    '</div>' +
    '<div class="problem-body">' +
      tagsHtml +
      sections +
      '<div class="section">' +
        '<div class="section-title">📖 马玥琦的题解</div>' +
        '<div class="solution-display" id="sol-' + p.id + '"></div>' +
      '</div>' +
      '<div class="draft-box" id="draft-' + p.id + '" style="display:none">' +
        '<textarea id="ta-' + p.id + '" placeholder="在此编写题解..."></textarea>' +
      '</div>' +
    '</div>';

  return card;
}

function renderAllProblems(data) {
  problems = data;
  PID_LIST = data.map(function(p) { return p.id; });

  var list = document.getElementById("problemList");
  list.innerHTML = "";
  for (var i = 0; i < data.length; i++) {
    list.appendChild(renderProblemCard(data[i]));
  }

  // Update stats
  var low = 0, mid = 0, high = 0;
  for (var i = 0; i < data.length; i++) {
    if (data[i].difficulty === "Low") low++;
    else if (data[i].difficulty === "Mid") mid++;
    else if (data[i].difficulty === "High") high++;
  }
  document.getElementById("totalCount").textContent = data.length;
  document.getElementById("statAll").textContent = data.length;
  document.getElementById("statLow").textContent = low;
  document.getElementById("statMid").textContent = mid;
  document.getElementById("statHigh").textContent = high;

  // Setup draft listeners
  for (var i = 0; i < PID_LIST.length; i++) {
    (function(pid) {
      var ta = document.getElementById("ta-" + pid);
      if (ta) ta.addEventListener("input", function() { localStorage.setItem("draft-" + pid, ta.value); updateSolutionBadges(); });
    })(PID_LIST[i]);
  }

  // Load solutions
  loadSolutions();
}

// ========== Problem toggle ==========
function toggleProblem(h) { h.parentElement.classList.toggle("open"); }

function filterProblems(d) {
  document.querySelectorAll(".filter-btn").forEach(function(b) {
    b.classList.toggle("active", b.textContent.indexOf(d === "all" ? "全部" : d) !== -1);
  });
  var v = 0;
  document.querySelectorAll(".problem-card").forEach(function(c) {
    if (d === "all" || c.dataset.difficulty === d) { c.style.display = ""; v++; }
    else c.style.display = "none";
  });
  document.getElementById("emptyState").style.display = v ? "none" : "";
}

function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove("show"); }, 2500);
}

// ========== Token ==========
function getToken() { return localStorage.getItem("gh_publish_token"); }
function setToken(t) { localStorage.setItem("gh_publish_token", t); }
function showTokenModal() { document.getElementById("tokenModal").classList.add("show"); document.getElementById("tokenInput").value = getToken() || ""; }
function closeTokenModal() { document.getElementById("tokenModal").classList.remove("show"); }
function saveToken() {
  var t = document.getElementById("tokenInput").value.trim();
  if (t) { setToken(t); toast("Token 已保存"); } else { localStorage.removeItem("gh_publish_token"); toast("Token 已清除"); }
  closeTokenModal();
}

// ========== Solutions ==========
async function loadSolutions() {
  try {
    var resp = await fetch("solutions.json?v=" + Date.now());
    if (!resp.ok) return;
    var data = await resp.json();
    for (var pid in data) {
      var el = document.getElementById("sol-" + pid);
      if (el && data[pid]) el.innerHTML = data[pid].replace(/\n/g, "<br>");
    }
  } catch (e) {}
  for (var i = 0; i < PID_LIST.length; i++) {
    var pid = PID_LIST[i];
    var saved = localStorage.getItem("draft-" + pid);
    if (saved) { var ta = document.getElementById("ta-" + pid); if (ta) ta.value = saved; }
  }
  updateSolutionBadges();
}

function updateSolutionBadges() {
  var count = 0;
  for (var i = 0; i < PID_LIST.length; i++) {
    var pid = PID_LIST[i];
    var el = document.getElementById("sol-" + pid);
    var draft = localStorage.getItem("draft-" + pid);
    var hasSolution = (el && el.innerHTML.trim() !== "") || (draft && draft.trim() !== "");
    if (hasSolution) count++;
    if (!el) continue;
    var header = el.closest(".problem-body");
    if (!header) continue;
    header = header.previousElementSibling;
    if (!header || !header.classList.contains("problem-header")) continue;
    var badge = header.querySelector(".solution-status");
    if (!badge) {
      badge = document.createElement("span");
      badge.className = "solution-status";
      header.appendChild(badge);
    }
    if (hasSolution) {
      badge.textContent = "已有题解";
      badge.className = "solution-status has";
    } else {
      badge.textContent = "暂无题解";
      badge.className = "solution-status none";
    }
  }
  document.getElementById("statSolution").textContent = count + "/" + PID_LIST.length;
}

// ========== Edit mode ==========
function toggleEditMode() {
  editMode = !editMode;
  var boxes = document.querySelectorAll(".draft-box");
  for (var i = 0; i < boxes.length; i++) boxes[i].style.display = editMode ? "" : "none";
  document.getElementById("editorToolbar").classList.toggle("show", editMode);
  if (editMode) toast("题解编辑模式已开启");
}

// ========== Export / Import ==========
function exportDrafts() {
  var drafts = {};
  for (var i = 0; i < PID_LIST.length; i++) {
    var pid = PID_LIST[i];
    var ta = document.getElementById("ta-" + pid);
    if (ta && ta.value.trim()) drafts[pid] = ta.value.trim();
  }
  var blob = new Blob([JSON.stringify(drafts, null, 2)], { type: "application/json" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a"); a.href = url; a.download = "drafts_backup.json"; a.click();
  URL.revokeObjectURL(url); toast("备份已下载");
}

function importDrafts() { document.getElementById("importFile").click(); }

function handleImport(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var drafts = JSON.parse(ev.target.result);
      var c = 0;
      for (var pid in drafts) {
        var ta = document.getElementById("ta-" + pid);
        if (ta) { ta.value = drafts[pid]; localStorage.setItem("draft-" + pid, drafts[pid]); c++; }
      }
      toast("已导入 " + c + " 道题解");
    } catch (err) { toast("文件格式错误"); }
  };
  reader.readAsText(file); e.target.value = "";
}

// ========== Publish ==========
async function publishAll() {
  var token = getToken();
  if (!token) { showTokenModal(); toast("请先设置 GitHub Token"); return; }

  var btn = document.getElementById("btnPublish");
  btn.disabled = true; btn.textContent = "发布中...";

  var headers = { Authorization: "token " + token, Accept: "application/vnd.github+json", "Content-Type": "application/json" };
  var apiBase = "https://api.github.com/repos/" + REPO + "/contents/solutions.json";

  var solutions = {};
  var sha = null;
  try {
    var r = await fetch(apiBase, { headers: headers });
    if (r.ok) {
      var d = await r.json();
      sha = d.sha;
      var existing = JSON.parse(decodeURIComponent(escape(atob(d.content))));
      for (var k in existing) solutions[k] = existing[k];
    }
  } catch (e) {}

  for (var i = 0; i < PID_LIST.length; i++) {
    var pid = PID_LIST[i];
    var ta = document.getElementById("ta-" + pid);
    if (ta && ta.value.trim()) solutions[pid] = ta.value.trim();
  }

  if (Object.keys(solutions).length === 0) { toast("请先写至少一道题解"); btn.disabled = false; btn.textContent = "🚀 一键发布"; return; }

  try {
    var body = {
      message: "更新题解 - " + new Date().toLocaleString("zh-CN"),
      content: btoa(unescape(encodeURIComponent(JSON.stringify(solutions, null, 2)))),
      branch: "main"
    };
    if (sha) body.sha = sha;

    var r2 = await fetch(apiBase, { method: "PUT", headers: headers, body: JSON.stringify(body) });
    if (r2.ok) {
      updateSolutionBadges();
      toast("✅ 发布成功！1-2 分钟后刷新页面即可看到更新。");
    } else {
      var err = await r2.json();
      if (err.message && err.message.indexOf("Bad credentials") !== -1) { toast("Token 无效，请重新设置"); showTokenModal(); }
      else toast("发布失败: " + (err.message || "未知错误"));
    }
  } catch (e) { toast("网络错误: " + e.message); }
  btn.disabled = false; btn.textContent = "🚀 一键发布";
}

// ========== Init ==========
fetch("problems.json?v=" + Date.now())
  .then(function(r) { return r.json(); })
  .then(renderAllProblems)
  .catch(function(e) { console.error("Failed to load problems:", e); });
</script>
